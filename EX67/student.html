<html>
    <head>
        <title>About me</title>
        <script src="js/mainjs.js"></script>
        <style type="text/css">
            @import url(css/maincss.css);
        </style>
    </head>
    <body >
      <table id="tblstudents" border="1px">
        <caption style="background-color: orange;">
            List of Students
        </caption>
        <thead>
            <tr>
                <th onclick="sortTable(0)">
                    Student ID
                </th>
                <th onclick="sortTable(1)">
                    Student Name
                </th>
                <th onclick="sortTable(2)">
                     Birthday
                </th>
                <th onclick="sortTable(3)">
                    Gender
                </th>
            </tr>
        </thead>
        <tbody id="bodystudents" class="clickable-row" data-href="student_detail.html">
        </tbody>
      </table>
      <script>
        var dataset_path="dataset/students.xml"
        var bodystudents=document.getElementById("bodystudents")
       load_student_fromxml(dataset_path, bodystudents)
      </script>
      <script>
        document.getElementById("bodystudents").addEventListener("click", function(e) {
            if (e.target.closest("tr")) {
                var row = e.target.closest("tr");
                var studentId = row.getElementsByTagName('td')[0].innerHTML;
                var href = "student_detail.html?id=" + studentId;
                window.location = href;
            }
        });
      </script>
    </body>
</html>
